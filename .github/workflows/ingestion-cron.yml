name: Daily Corpus Ingestion Refresh

on:
  schedule:
    - cron: '0 5 * * *' # Runs at 05:00 AM UTC (10:30 AM IST) every day
  workflow_dispatch: # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  refresh-corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Ingestion Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m ingestion.embedder

      - name: Commit and Push Updated ChromaDB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/chroma_db/
          git commit -m "chore(data): auto-refresh vector db chunks" || exit 0
          git push
