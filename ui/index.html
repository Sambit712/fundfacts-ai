<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundFacts Assistant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@400,0,0,24" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>

    <!-- Stale Data Banner -->
    <div id="stale-banner" class="stale-banner">
        Data may be outdated. Last refreshed: <span id="stale-date"></span>
    </div>

    <!-- Disclaimer Banner -->
    <div class="disclaimer-banner">
        <span class="material-symbols-outlined icon">warning</span>
        <p><strong>Facts-only. No investment advice.</strong></p>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="material-symbols-outlined" style="color: var(--accent-primary)">analytics</span>
                <h1>FundFacts</h1>
            </div>
            <div class="sidebar-content">
                <!-- Navigation or History could go here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Window -->
            <div id="chat-window" class="chat-window">
                
                <!-- Initial Welcome State -->
                <div id="welcome-state" class="welcome-container">
                    <div class="welcome-icon">
                        <span class="material-symbols-outlined">bar_chart</span>
                    </div>
                    <h2>Ask factual questions about 7 mutual fund schemes</h2>
                    <p>Get instant, verifiable answers regarding NAV, expense ratios, asset allocation, and exit loads.</p>
                    
                    <div class="example-prompts">
                        <button class="prompt-btn" onclick="submitPrompt('What is the expense ratio of HDFC Mid Cap Fund?')">
                            <span class="material-symbols-outlined">search</span>
                            <span>What is the expense ratio of HDFC Mid Cap Fund?</span>
                        </button>
                        <button class="prompt-btn" onclick="submitPrompt('What is the minimum SIP for SBI Contra Fund?')">
                            <span class="material-symbols-outlined">search</span>
                            <span>What is the minimum SIP for SBI Contra Fund?</span>
                        </button>
                        <button class="prompt-btn" onclick="submitPrompt('What is the exit load for UTI Small Cap Fund?')">
                            <span class="material-symbols-outlined">search</span>
                            <span>What is the exit load for UTI Small Cap Fund?</span>
                        </button>
                    </div>
                </div>
                
                <!-- Chat messages will be injected here -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <form id="chat-form" class="input-container">
                    <input 
                        type="text" 
                        id="chat-input" 
                        placeholder="Ask a factual question about a fund..." 
                        autocomplete="off"
                        required
                    />
                    <button type="submit" id="send-btn" class="send-btn">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="/ui/app.js"></script>
</body>
</html>
